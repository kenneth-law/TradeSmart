providers = ["python"]

[phases.setup]
nixPkgs = ["nodejs_20", "gcc"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --worker-class gthread --threads 4 --timeout 120"
